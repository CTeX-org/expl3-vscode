name: Release

# Tag-driven release, mirroring the ctex-kit philosophy:
#   vX.Y.Z-rcM  -> build + GitHub prerelease (public beta). No marketplace.
#   vX.Y.Z      -> build + GitHub release, then GATED publish to
#                  VS Code Marketplace + Open VSX.
#
# "Only I can publish" is enforced by the `release` GitHub Environment:
# the publish job requires manual approval from the environment's reviewer(s),
# and the VSCE_PAT / OVSX_PAT secrets live on that environment (so no other
# job — or org member — can read them or publish without an approval click).
#
# One-time setup (see README / repo Settings → Environments):
#   1. Create an environment named `release`.
#   2. Add yourself as a Required reviewer.
#   3. Add VSCE_PAT and OVSX_PAT as *environment* secrets of `release`.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
      base: ${{ steps.tag.outputs.base }}
      prerelease: ${{ steps.tag.outputs.prerelease }}
      vsix: ${{ steps.pack.outputs.vsix }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6

      - name: Parse tag
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v0.1.0 or v0.1.0-rc2
          VER="${TAG#v}"                    # strip leading v
          BASE="$(printf '%s' "$VER" | sed -E 's/-(rc|pre|alpha|beta)[0-9]*$//')"
          if [ "$VER" != "$BASE" ]; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi
          {
            echo "version=$VER"
            echo "base=$BASE"
            echo "prerelease=$PRERELEASE"
          } >> "$GITHUB_OUTPUT"
          echo "tag=$TAG  version=$VER  base=$BASE  prerelease=$PRERELEASE"

      - name: Verify package.json version matches tag base
        run: |
          PKG_VER="$(node -p "require('./package.json').version")"
          BASE="${{ steps.tag.outputs.base }}"
          if [ "$PKG_VER" != "$BASE" ]; then
            echo "::error::tag ${{ steps.tag.outputs.version }} (base $BASE) != package.json version $PKG_VER. Bump package.json before tagging."
            exit 1
          fi
          echo "version check ok: $PKG_VER"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Package VSIX
        id: pack
        run: |
          OUT="expl3-vscode-${{ steps.tag.outputs.version }}.vsix"
          npx vsce package --no-yarn -o "$OUT"
          echo "vsix=$OUT" >> "$GITHUB_OUTPUT"
          ls -la "$OUT"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: vsix
          path: ${{ steps.pack.outputs.vsix }}
          retention-days: 30

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FLAGS=()
          if [ "${{ steps.tag.outputs.prerelease }}" = "true" ]; then
            FLAGS+=(--prerelease --title "expl3-vscode ${{ steps.tag.outputs.version }} (prerelease)")
          else
            FLAGS+=(--latest --title "expl3-vscode ${{ steps.tag.outputs.version }}")
          fi
          gh release create "${GITHUB_REF_NAME}" \
            "${{ steps.pack.outputs.vsix }}" \
            --generate-notes \
            "${FLAGS[@]}" \
          || gh release upload "${GITHUB_REF_NAME}" "${{ steps.pack.outputs.vsix }}" --clobber

  # Gated by the `release` environment: only its Required reviewer(s) can
  # approve, and VSCE_PAT / OVSX_PAT are environment-scoped secrets. Runs only
  # for non-rc tags.
  publish:
    needs: build
    if: needs.build.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/setup-node@v6

      - name: Download VSIX artifact
        uses: actions/download-artifact@v8
        with:
          name: vsix

      - name: Install tooling
        run: npm install --no-save @vscode/vsce ovsx

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "::error::VSCE_PAT not set on the 'release' environment."
            exit 1
          fi
          npx vsce publish --no-yarn --packagePath "${{ needs.build.outputs.vsix }}" -p "$VSCE_PAT"

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "::error::OVSX_PAT not set on the 'release' environment."
            exit 1
          fi
          npx ovsx create-namespace CTeX-org -p "$OVSX_PAT" || true
          npx ovsx publish "${{ needs.build.outputs.vsix }}" -p "$OVSX_PAT"
